<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Smile - Clínica Dental Moderna</title>
    
    <!-- Google Fonts: Inter y Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        'medical-blue': '#2563eb',
                        'medical-dark': '#1e3a8a',
                        'medical-light': '#eff6ff',
                        'medical-gray': '#f8fafc',
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .font-display { font-family: 'Outfit', sans-serif; }
        .bg-medical-blue { background-color: #2563eb; }
        .bg-medical-gray { background-color: #f8fafc; }
        .text-medical-blue { color: #2563eb; }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-white text-slate-800 antialiased">
    <div id="root"></div>

    <!-- React de Producción vía CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para transformar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Iconos de Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente para manejar los iconos de Lucide dinamicamente
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Navbar = () => (
            <nav className="bg-white border-b border-slate-100 sticky top-0 z-50">
                <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                        <div className="w-10 h-10 bg-[#2563eb] rounded-xl flex items-center justify-center">
                            <Icon name="sparkles" className="text-white" size={20} />
                        </div>
                        <span className="text-xl font-bold text-slate-900 tracking-tight">Dr. Smile</span>
                    </div>
                    <div className="hidden md:flex gap-8 text-[14px] font-medium text-slate-600">
                        <a href="#home" className="text-[#2563eb] hover:text-[#1e3a8a] transition-colors">Home</a>
                        <a href="#about" className="hover:text-[#2563eb] transition-colors">About Us</a>
                        <a href="#services" className="hover:text-[#2563eb] transition-colors">Services</a>
                        <a href="#contact" className="hover:text-[#2563eb] transition-colors">Contact</a>
                    </div>
                    <button className="bg-[#2563eb] text-white text-sm font-semibold px-6 py-2.5 rounded-full hover:bg-[#1e3a8a] transition-all shadow-lg shadow-blue-500/20">
                        Book Now
                    </button>
                </div>
            </nav>
        );

        const SectionHeading = ({ badge, title, subtitle, centered = false }) => (
            <div className={`mb-12 ${centered ? 'text-center' : ''}`}>
                {badge && (
                    <span className="inline-block px-4 py-1.5 rounded-full bg-[#eff6ff] text-[#2563eb] text-xs font-bold mb-4 uppercase tracking-wider italic">
                        {badge}
                    </span>
                )}
                <h2 className="text-3xl md:text-5xl font-display font-extrabold text-slate-900 leading-tight mb-4">{title}</h2>
                {subtitle && <p className="text-slate-500 max-w-2xl mx-auto text-lg leading-relaxed">{subtitle}</p>}
            </div>
        );

        const App = () => {
            const services = [
                { title: "General Dentistry", icon: "stethoscope", desc: "Comprehensive checkups and treatments for all ages." },
                { title: "Teeth Whitening", icon: "sparkles", desc: "Professional brightening for a radiant, confident smile." },
                { title: "Dental Implants", icon: "shield-check", desc: "Advanced solutions to restore missing teeth permanently." },
                { title: "Dental Sealant", icon: "check-circle-2", desc: "Preventive care to protect teeth from decay and cavities." }
            ];

            return (
                <div className="min-h-screen">
                    <div className="bg-[#2563eb] text-white py-2 px-6 hidden lg:block">
                        <div className="max-w-7xl mx-auto flex justify-between items-center text-[12px] font-medium tracking-wide">
                            <div className="flex gap-8">
                                <span className="flex items-center gap-2"><Icon name="phone" size={14} /> +1 (555) 000-0000</span>
                                <span className="flex items-center gap-2"><Icon name="mail" size={14} /> contact@drsmile.com</span>
                                <span className="flex items-center gap-2"><Icon name="map-pin" size={14} /> 2484 Main St, NJ 45903</span>
                            </div>
                            <div className="flex gap-4 opacity-80">
                                <Icon name="facebook" size={14} className="cursor-pointer" />
                                <Icon name="twitter" size={14} className="cursor-pointer" />
                                <Icon name="instagram" size={14} className="cursor-pointer" />
                            </div>
                        </div>
                    </div>

                    <Navbar />

                    {/* Hero */}
                    <section id="home" className="relative pt-12 lg:pt-24 pb-20 overflow-hidden bg-[#f8fafc]">
                        <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center">
                            <div className="space-y-8 animate-fade-in-up">
                                <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white text-[#2563eb] text-xs font-bold border border-slate-100 shadow-sm">
                                    <Icon name="sparkles" size={14} />
                                    <span>Top-Notch Dental Care, Just for You</span>
                                </div>
                                <h1 className="text-5xl md:text-7xl font-display font-black text-slate-900 leading-[1] tracking-tight">
                                    Your <span className="text-[#2563eb]">Best Dental</span><br />
                                    Experience <span className="text-[#1e3a8a] italic">Awaits</span>
                                </h1>
                                <p className="text-lg text-slate-500 leading-relaxed max-w-lg">
                                    Ofrecemos soluciones dentales de vanguardia con un toque humano, garantizando que cada visita sea cómoda y efectiva.
                                </p>
                                <div className="flex flex-wrap gap-4">
                                    <button className="bg-[#2563eb] text-white px-8 py-4 rounded-full font-bold text-sm shadow-xl shadow-blue-500/30 hover:bg-[#1e3a8a] transition-all">
                                        Explorar Servicios
                                    </button>
                                    <button className="flex items-center gap-3 px-6 py-4 rounded-full font-bold text-sm text-slate-700 hover:bg-white transition-all">
                                        <div className="w-10 h-10 bg-white shadow-lg rounded-full flex items-center justify-center text-[#2563eb]">
                                            <Icon name="play" size={16} />
                                        </div>
                                        Ver Video
                                    </button>
                                </div>
                            </div>
                            <div className="relative hidden lg:block">
                                <div className="rounded-[4rem] overflow-hidden aspect-[4/5] shadow-2xl scale-110">
                                    <img 
                                        src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?q=80&w=1974&auto=format&fit=crop" 
                                        alt="Odontóloga" 
                                        className="w-full h-full object-cover" 
                                    />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* About Us */}
                    <section id="about" className="py-24 px-6">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-20 items-center">
                            <div className="relative grid grid-cols-2 gap-4">
                                <div className="rounded-[3rem] overflow-hidden aspect-square shadow-xl rotate-[-5deg]">
                                    <img src="https://images.unsplash.com/photo-1593022356769-11f09a79a24a?q=80&w=2070&auto=format&fit=crop" className="w-full h-full object-cover" />
                                </div>
                                <div className="rounded-[3rem] overflow-hidden aspect-[4/5] shadow-xl translate-y-12">
                                    <img src="https://images.unsplash.com/photo-1629909613654-28e377c37b09?q=80&w=2070&auto=format&fit=crop" className="w-full h-full object-cover" />
                                </div>
                                <div className="absolute -bottom-6 -right-6 lg:-right-12 bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
                                    <span className="block text-4xl font-black text-[#2563eb] mb-1">15+</span>
                                    <span className="text-xs uppercase tracking-widest font-bold text-slate-500">Años de Experticia</span>
                                </div>
                            </div>
                            <div>
                                <SectionHeading badge="Sobre Nosotros" title="Cuidando tu sonrisa con tecnología de punta" subtitle="Nuestro equipo se dedica a proporcionar cuidado dental excepcional en un ambiente cálido y profesional." />
                                <div className="space-y-4 mb-10">
                                    {["Servicios Premium en los que puedes confiar", "Expertos galardonados", "Atención personalizada"].map((item, i) => (
                                        <div key={i} className="flex items-center gap-4">
                                            <div className="w-6 h-6 rounded-full bg-[#eff6ff] flex items-center justify-center text-[#2563eb]">
                                                <Icon name="check-circle-2" size={14} />
                                            </div>
                                            <span className="font-semibold text-slate-700">{item}</span>
                                        </div>
                                    ))}
                                </div>
                                <button className="px-8 py-4 rounded-full bg-[#2563eb] text-white font-bold text-sm shadow-xl shadow-blue-500/20 hover:scale-105 transition-transform">Más Información</button>
                            </div>
                        </div>
                    </section>

                    {/* Services */}
                    <section id="services" className="py-24 px-6 bg-slate-900 text-white rounded-t-[5rem]">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end gap-8 mb-16">
                                <SectionHeading badge="Servicios" title="Soluciones Integrales para tu Salud Bucal" />
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {services.map((service, index) => (
                                    <div key={index} className="group p-8 rounded-[2.5rem] bg-white text-slate-900 shadow-xl hover:bg-[#2563eb] hover:text-white transition-all duration-500 cursor-pointer h-full flex flex-col">
                                        <div className="w-14 h-14 rounded-2xl bg-[#eff6ff] flex items-center justify-center text-[#2563eb] mb-8 group-hover:bg-white/20 group-hover:text-white transition-colors">
                                            <Icon name={service.icon} size={28} />
                                        </div>
                                        <h3 className="text-xl font-bold mb-4 tracking-tight">{service.title}</h3>
                                        <p className="text-sm opacity-60 leading-relaxed group-hover:opacity-90">{service.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* CTA */}
                    <section className="py-24 px-6">
                        <div className="max-w-5xl mx-auto rounded-[4rem] bg-[#2563eb] p-8 md:p-20 text-center relative overflow-hidden shadow-2xl">
                            <div className="relative z-10 space-y-8">
                                <h2 className="text-3xl md:text-5xl font-display font-black text-white leading-tight">¿Lista para tu mejor sonrisa?<br />¡Agenda hoy mismo!</h2>
                                <button className="bg-white text-[#2563eb] px-10 py-5 rounded-full font-bold text-sm shadow-2xl hover:scale-105 transition-transform">Pedir una Cita</button>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer id="contact" className="bg-slate-50 border-t border-slate-200">
                        <div className="max-w-7xl mx-auto px-6 py-20">
                            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-12 text-center md:text-left">
                                <div className="space-y-6">
                                    <div className="flex items-center justify-center md:justify-start gap-2">
                                        <div className="w-8 h-8 bg-[#2563eb] rounded-lg flex items-center justify-center">
                                            <Icon name="sparkles" className="text-white" size={16} />
                                        </div>
                                        <span className="text-xl font-bold text-slate-900">Dr. Smile</span>
                                    </div>
                                    <p className="text-sm text-slate-500 italic">Cuidado profesional para una sonrisa radiante y saludable.</p>
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-900 mb-6 uppercase text-xs italic tracking-widest">Links Rápidos</h4>
                                    <ul className="space-y-4 text-sm text-slate-500 font-medium cursor-pointer">
                                        <li className="hover:text-[#2563eb]">Nosotros</li>
                                        <li className="hover:text-[#2563eb]">Servicios</li>
                                        <li className="hover:text-[#2563eb]">Contacto</li>
                                    </ul>
                                </div>
                                <div className="md:col-span-2">
                                    <h4 className="font-bold text-slate-900 mb-6 uppercase text-xs italic tracking-widest">Newsletter</h4>
                                    <p className="text-sm text-slate-500 mb-4">Suscríbete para consejos de salud dental.</p>
                                    <div className="relative max-w-sm mx-auto md:mx-0">
                                        <input type="email" placeholder="Tu Email" className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-[#2563eb]" />
                                        <button className="absolute right-2 top-1/2 -translate-y-1/2 bg-[#2563eb] text-white p-2 rounded-xl">
                                            <Icon name="chevron-right" size={16} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-20 pt-8 border-t border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] italic">
                                <span>©2024 Dr. Smile. Todos los derechos reservados</span>
                                <div className="flex gap-8"><span>Términos</span><span>Privacidad</span></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Iniciar iconos lucide tras el primer renderizado
        setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
    </script>
</body>
</html>
